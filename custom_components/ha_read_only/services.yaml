list_tokens:
  name: Token auflisten
  description: Listet alle konfigurierten API-Tokens mit Namen und maskierten Token-Werten auf.
  fields: {}

get_token_info:
  name: Token-Details abrufen
  description: Zeigt die vollständige Konfiguration eines Tokens an (Token-Wert maskiert).
  fields:
    token_name:
      name: Token-Name
      description: Name des Tokens dessen Details abgerufen werden sollen.
      required: true
      example: "Wetterdienst"
      selector:
        text:
          type: text
